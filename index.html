<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="image-upload-area">
                <img id="profileImage" src="https://via.placeholder.com/200/667eea/white?text=PHOTO" alt="Profile">
                <div class="upload-overlay">
                    <label for="imageUpload" class="upload-btn">📸 Change Photo</label>
                    <input type="file" id="imageUpload" accept="image/*">
                </div>
            </div>
            <h1>Juan Dela Cruz</h1>
            <p class="title">Web Developer</p>
        </div>

        <div class="section">
            <h2>👋 About Me</h2>
            <p>Hello! Ako si Juan, isang web developer na mahilig gumawa ng magagandang websites.</p>
        </div>

        <div class="section">
            <h2>💻 Skills</h2>
            <div class="skills">
                <span class="skill-tag">HTML</span>
                <span class="skill-tag">CSS</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">React</span>
            </div>
        </div>

        <div class="section">
            <h2>📁 Projects</h2>
            <div class="projects">
                <div class="project-card">Project 1</div>
                <div class="project-card">Project 2</div>
                <div class="project-card">Project 3</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
